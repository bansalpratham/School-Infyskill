services:
  - type: web
    name: school-hub-gateway
    runtime: node
    plan: free
    rootDir: backend/api-gateway-ts
    buildCommand: pnpm -w install --frozen-lockfile && pnpm -w build:shared && pnpm -w --filter api-gateway-ts build
    startCommand: pnpm -w --filter api-gateway-ts start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: TENANCY_DISABLED
        value: "false"
      - key: CORS_ORIGIN
        sync: false
      - key: AUTH_SERVICE_URL
        fromService:
          type: web
          name: school-hub-auth
          property: url
      - key: STUDENT_SERVICE_URL
        fromService:
          type: web
          name: school-hub-student
          property: url
      - key: TEACHER_SERVICE_URL
        fromService:
          type: web
          name: school-hub-teacher
          property: url
      - key: FEES_SERVICE_URL
        fromService:
          type: web
          name: school-hub-fees
          property: url
      - key: EXAM_SERVICE_URL
        fromService:
          type: web
