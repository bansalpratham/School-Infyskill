  - type: web
    name: school-hub-auth
    runtime: node
    plan: free
    rootDir: backend/auth-service
    buildCommand: pnpm -w install --frozen-lockfile
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "5001"
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        fromService:
          type: web
          name: school-hub-gateway
          property: env.JWT_SECRET

