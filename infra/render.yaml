  - type: web
    name: school-hub-auth
    runtime: node
    plan: free
    rootDir: .
    buildCommand: pnpm -C backend/auth-service install --frozen-lockfile --prod=false
    startCommand: pnpm -C backend/auth-service start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "5001"
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false

