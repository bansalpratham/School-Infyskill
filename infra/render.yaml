services:
  - type: web
    name: school-hub-gateway
    runtime: node
    plan: free
    rootDir: .
    buildCommand: pnpm -r install --frozen-lockfile --prod=false && pnpm -w build:shared && pnpm -w --filter api-gateway-ts build
    startCommand: pnpm -w --filter api-gateway-ts start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        sync: false
      - key: TENANCY_DISABLED
        value: "false"
      - key: CORS_ORIGIN
        sync: false
      - key: AUTH_SERVICE_URL
        fromService:
          type: web
          name: school-hub-auth
          property: hostport
      - key: STUDENT_SERVICE_URL
        fromService:
          type: web
          name: school-hub-student
          property: hostport
      - key: TEACHER_SERVICE_URL
        fromService:
          type: web
          name: school-hub-teacher
          property: hostport
      - key: FEES_SERVICE_URL
        fromService:
          type: web
          name: school-hub-fees
          property: hostport
      - key: EXAM_SERVICE_URL
        fromService:
          type: web
          name: school-hub-exam
          property: hostport
      - key: CLASS_SERVICE_URL
        fromService:
          type: web
          name: school-hub-class
          property: hostport
      - key: SUBJECT_SERVICE_URL
        fromService:
          type: web
          name: school-hub-subject
          property: hostport
      - key: CUSTOM_FIELDS_SERVICE_URL
