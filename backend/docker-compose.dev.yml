services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data_dev:/data/db

  api-gateway-ts:
    build:
      context: ..
      dockerfile: backend/api-gateway-ts/Dockerfile
    restart: unless-stopped
    depends_on:
      - auth-service
      - student-service
      - teacher-service
      - fees-service
      - exam-service
    environment:
      PORT: 4100
      JWT_SECRET: change_me_super_secret
      CORS_ORIGIN: "http://localhost:5173,http://127.0.0.1:5173"
      AUTH_SERVICE_URL: http://auth-service:5000
      STUDENT_SERVICE_URL: http://student-service:4002
      TEACHER_SERVICE_URL: http://teacher-service:4003
      FEES_SERVICE_URL: http://fees-service:4004
      EXAM_SERVICE_URL: http://exam-service:4006
      TEACHER_TIMETABLE_SERVICE_URL: http://teacher-timetable-service:4012
    ports:
      - "4100:4100"

  # Reuse existing JS services (kept unchanged) but point them to the dev mongo
  auth-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_DIR: auth-service
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      PORT: 5000
      MONGODB_URI: mongodb://mongo:27017/school_hub
      JWT_SECRET: change_me_super_secret
      AUTH_DISABLED: "false"
      CORS_ORIGIN: "http://localhost:5173,http://127.0.0.1:5173"

  student-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_DIR: student-service
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      PORT: 4002
      MONGODB_URI: mongodb://mongo:27017/school_hub
      JWT_SECRET: change_me_super_secret
      AUTH_DISABLED: "false"
      CORS_ORIGIN: "http://localhost:5173,http://127.0.0.1:5173"

  teacher-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_DIR: teacher-service
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      PORT: 4003
      MONGODB_URI: mongodb://mongo:27017/school_hub
      JWT_SECRET: change_me_super_secret
      AUTH_DISABLED: "false"
      CORS_ORIGIN: "http://localhost:5173,http://127.0.0.1:5173"

  fees-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_DIR: fees-service
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      PORT: 4004
      MONGODB_URI: mongodb://mongo:27017/school_hub
      JWT_SECRET: change_me_super_secret
      AUTH_DISABLED: "false"
      CORS_ORIGIN: "http://localhost:5173,http://127.0.0.1:5173"

  exam-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_DIR: exam-service
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      PORT: 4006
      MONGODB_URI: mongodb://mongo:27017/school_hub
      JWT_SECRET: change_me_super_secret
      AUTH_DISABLED: "false"
      CORS_ORIGIN: "http://localhost:5173,http://127.0.0.1:5173"

volumes:
  mongo_data_dev:
