services:
  mongo:
    image: mongo:7
    container_name: school-hub-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db

  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_DIR: api-gateway
    container_name: school-hub-api-gateway
    restart: unless-stopped
    depends_on:
      - auth-service
      - student-service
      - teacher-service
      - fees-service
      - payments-service
      - exam-service
      - announcements-service
      - requests-service
      - import-export-service
      - dashboard-service
      - settings-service
      - teacher-profile-service
      - teacher-timetable-service
      - teacher-attendance-service
      - teacher-diary-service
      - teacher-feedback-service
      - teacher-notifications-service
      - teacher-meetings-service
      - teacher-achievements-service
    environment:
      PORT: 4000
      CORS_ORIGIN: "http://localhost:5173,http://127.0.0.1:5173"
      AUTH_SERVICE_URL: http://auth-service:5000
      STUDENT_SERVICE_URL: http://student-service:4002
      TEACHER_SERVICE_URL: http://teacher-service:4003
      FEES_SERVICE_URL: http://fees-service:4004
      PAYMENTS_SERVICE_URL: http://payments-service:4005
      EXAM_SERVICE_URL: http://exam-service:4006
      ANNOUNCEMENTS_SERVICE_URL: http://announcements-service:4007
      REQUESTS_SERVICE_URL: http://requests-service:4008
      IMPORT_EXPORT_SERVICE_URL: http://import-export-service:4009
      DASHBOARD_SERVICE_URL: http://dashboard-service:4010
      SETTINGS_SERVICE_URL: http://settings-service:4014
      TEACHER_PROFILE_SERVICE_URL: http://teacher-profile-service:4011
      TEACHER_TIMETABLE_SERVICE_URL: http://teacher-timetable-service:4012
      TEACHER_ATTENDANCE_SERVICE_URL: http://teacher-attendance-service:4013
      TEACHER_DIARY_SERVICE_URL: http://teacher-diary-service:4015
      TEACHER_FEEDBACK_SERVICE_URL: http://teacher-feedback-service:4016
      TEACHER_NOTIFICATIONS_SERVICE_URL: http://teacher-notifications-service:4017
      TEACHER_MEETINGS_SERVICE_URL: http://teacher-meetings-service:4018
      TEACHER_ACHIEVEMENTS_SERVICE_URL: http://teacher-achievements-service:4019
    ports:
      - "4000:4000"

  auth-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_DIR: auth-service
    container_name: school-hub-auth-service
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      PORT: 5000
      MONGODB_URI: mongodb://mongo:27017/school_hub
      JWT_SECRET: change_me_super_secret
      AUTH_DISABLED: "false"
      CORS_ORIGIN: "http://localhost:5173,http://127.0.0.1:5173"
    ports:
      - "5000:5000"

  student-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_DIR: student-service
    container_name: school-hub-student-service
    restart: unless-stopped
